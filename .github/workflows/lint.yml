name: Code quality

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  biome:
    name: Run Biome
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Biome check
        run: npm run check